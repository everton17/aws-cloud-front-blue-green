name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC authentication
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::622047408518:role/github-actions-deploy
          aws-region: us-east-1
          role-session-name: gha-deploy-${{ github.run_id }}

      - name: Clear rollback bucket
        run: |
          aws s3 rm s3://site-rollback-afcb --recursive

      - name: Copy current version from main bucket to rollback bucket
        run: |
          aws s3 sync s3://site-production-4ce1 s3://site-rollback-afcb

      - name: Build
        run: |
          cd ./bluegreen_site && npm run build

      - name: Package build into .tar.gz named by commit hash
        id: package
        run: |
          COMMIT_SHA="${{ github.sha }}"
          PACKAGE_NAME="$COMMIT_SHA.tar.gz"
          tar -czf "$PACKAGE_NAME" -C ./bluegreen_site/dist .
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload versioned package to versions bucket
        run: |
          aws s3 cp "${{ steps.package.outputs.package_name }}" \
            s3://site-versions-0973/${{ steps.package.outputs.package_name }}

      - name: Upload new version to main bucket
        run: |
          aws s3 sync ./bluegreen_site/dist s3://site-production-4ce1 --delete

      - name: Ensure rollback parameter store is set to false
        run: |
          CURRENT_VALUE=$(aws ssm get-parameter \
            --name "/Lambda/CF/Rollback" \
            --query "Parameter.Value" \
            --output text 2>/dev/null || echo "false")

          if [ "$CURRENT_VALUE" = "true" ]; then
            echo "Parameter store is true, changing to false"
            aws ssm put-parameter \
              --name "/Lambda/CF/Rollback" \
              --value "false" \
              --type String \
              --overwrite
          else
            echo "Parameter store is already false, nothing to do"
          fi

      - name: Invalidate CloudFront cache
        id: invalidate
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id E277M6NI7833EX \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)
          echo "invalidation_id=$INVALIDATION_ID" >> "$GITHUB_OUTPUT"

      - name: Check invalidation status
        run: |
          aws cloudfront wait invalidation-completed \
            --distribution-id E277M6NI7833EX \
            --id ${{ steps.invalidate.outputs.invalidation_id }}

          STATUS=$(aws cloudfront get-invalidation \
            --distribution-id E277M6NI7833EX \
            --id ${{ steps.invalidate.outputs.invalidation_id }} \
            --query "Invalidation.Status" \
            --output text)

          if [ "$STATUS" = "Completed" ]; then
            echo "Invalidation executed successfully (ID: ${{ steps.invalidate.outputs.invalidation_id }})"
          else
            echo "Invalidation finished with unexpected status: $STATUS"
            exit 1
          fi
